<!DOCTYPE html>
<html>
<head>
  <title>Face Capture Test</title>
</head>
<body>

<h2>Face Registration</h2>

<video id="video" autoplay playsinline style="width:400px; border:1px solid black;"></video>
<br><br>

<button onclick="capture()">📸 Capture & Send</button>

<script>
const video = document.getElementById("video");

// 1. Start camera
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    console.log("Camera error:", err);
  });

// 2. Capture function
function capture() {

  if (!video.videoWidth) {
    alert("Camera not ready yet!");
    return;
  }

  // Create canvas
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");

  // Draw current frame
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Convert to base64
  const image = canvas.toDataURL("image/jpeg", 0.8);

  console.log("Captured Image (first 100 chars):", image.slice(0, 100));

  // Send to backend
  fetch("http://127.0.0.1:8000/auth/register-face", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: "kinshu@gmail.com",
      image: image
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log("Backend Response:", data);
    alert(JSON.stringify(data));
  })
  .catch(err => {
    console.error("Error:", err);
  });
}

console.log(image);
document.body.innerHTML += `<img src="${image}" width="200"/>`;

</script>

</body>
</html>
